services:
  postgres:
    image: postgres:16-alpine
    container_name: nocrato_postgres
    environment:
      POSTGRES_DB: nocrato_health
      POSTGRES_USER: nocrato
      POSTGRES_PASSWORD: nocrato_secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nocrato -d nocrato_health"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - nocrato_network
    restart: unless-stopped

networks:
  nocrato_network:
    name: nocrato_dev_network

volumes:
  postgres_data:
    name: nocrato_postgres_data
