name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Setup SSH
        env:
          SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          CLEAN_HOST=$(printf '%s' "$VPS_HOST" | sed 's/[^a-zA-Z0-9.:_-]//g')
          ssh-keyscan -H "$CLEAN_HOST" >> ~/.ssh/known_hosts

      - name: Deploy via SSH
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          CLEAN_USER=$(printf '%s' "$VPS_USER" | sed 's/[^a-zA-Z0-9._-]//g')
          CLEAN_HOST=$(printf '%s' "$VPS_HOST" | sed 's/[^a-zA-Z0-9.:_-]//g')
          ssh -i ~/.ssh/id_rsa \
            -o StrictHostKeyChecking=no \
            -o IdentitiesOnly=yes \
            -l "$CLEAN_USER" "$CLEAN_HOST" \
            'set -e
            APP_DIR="/opt/nocrato-health-v2"
            COMPOSE="docker compose -f $APP_DIR/docker/docker-compose.prod.yml --env-file $APP_DIR/.env"
            echo "==> git pull"
            cd $APP_DIR
            git pull origin main
            echo "==> build"
            $COMPOSE build
            echo "==> migrations"
            $COMPOSE run --rm -e NODE_ENV=production api node dist/database/migrate.js
            echo "==> up"
            $COMPOSE up -d
            echo "==> done"'
